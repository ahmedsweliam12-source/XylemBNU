<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xylem System — Patient Management</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #f0fbfd; font-family: 'Syne','DM Sans',sans-serif; color: #0a2030; min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #e0f7fa; }
    ::-webkit-scrollbar-thumb { background: rgba(43,188,212,0.4); border-radius: 3px; }
    input::placeholder { color: rgba(10,32,48,0.3); }
    input:focus { outline: none; border-color: #2bbcd4 !important; box-shadow: 0 0 0 3px rgba(43,188,212,0.12); }
    @keyframes floatParticle {
      0%,100% { transform: translateY(0) translateX(0); }
      33%      { transform: translateY(-40px) translateX(20px); }
      66%      { transform: translateY(20px) translateX(-15px); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes glow {
      0%,100% { opacity: 0.4; }
      50%      { opacity: 1; }
    }
    @keyframes popIn {
      0%   { transform: scale(0.85); opacity: 0; }
      70%  { transform: scale(1.06); }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    /* ── DEMO DATA ─────────────────────────────────────────────────────────── */
    const DEMO = [
      { id:"PT-001", firstName:"Ahmed",  lastName:"Al-Rashid", age:"34", phone:"+20 100 234 5678",
        complaint:"Severe throbbing pain in upper right molar for 3 days, worsens with cold liquids and biting pressure.",
        diagnosis:"Irreversible pulpitis, tooth #16. Root canal therapy indicated with immediate intervention.",
        department:"Endodontics", status:"unassigned", assignedTo:"",
        images:["https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Radiograph_of_Mandibular_Molars.jpg/320px-Radiograph_of_Mandibular_Molars.jpg"] },
      { id:"PT-002", firstName:"Sara",   lastName:"El-Masri",  age:"28", phone:"+20 101 345 6789",
        complaint:"Persistent bleeding gums for 2 weeks, noticeable bad breath, and tooth sensitivity to temperature.",
        diagnosis:"Moderate chronic periodontitis. Scaling and root planing recommended in 4 quadrants.",
        department:"Periodontics", status:"unassigned", assignedTo:"", images:[] },
      { id:"PT-003", firstName:"Omar",   lastName:"Hassan",    age:"45", phone:"+20 112 456 7890",
        complaint:"Missing upper front teeth for 6 months, difficulty eating and significant speech impediment.",
        diagnosis:"Partial edentulism #11, #12, #21. Fixed partial denture with implant support recommended.",
        department:"Fixed Prosthodontics", status:"unassigned", assignedTo:"",
        images:["https://upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Periapical_radiograph.jpg/320px-Periapical_radiograph.jpg"] },
      { id:"PT-004", firstName:"Nour",   lastName:"Ibrahim",   age:"8",  phone:"+20 100 567 8901",
        complaint:"Cavity in lower left primary molar, mild pain with sweets and cold beverages.",
        diagnosis:"Deep carious lesion #74. Pulpotomy and stainless steel crown required.",
        department:"Pedodontics", status:"unassigned", assignedTo:"", images:[] },
      { id:"PT-005", firstName:"Layla",  lastName:"Mostafa",   age:"31", phone:"+20 102 678 9012",
        complaint:"Sensitivity on upper left premolar. Small dark spot visible on tooth surface.",
        diagnosis:"Class II caries #25. Direct composite resin restoration planned.",
        department:"Operative", status:"unassigned", assignedTo:"",
        images:["https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Radiograph_of_Mandibular_Molars.jpg/320px-Radiograph_of_Mandibular_Molars.jpg"] },
      { id:"PT-006", firstName:"Karim",  lastName:"Youssef",   age:"52", phone:"+20 115 789 0123",
        complaint:"Impacted lower wisdom tooth causing severe pain and swelling for 5 days.",
        diagnosis:"Horizontally impacted mandibular third molar #48. Surgical extraction recommended.",
        department:"Oral Surgery", status:"unassigned", assignedTo:"", images:[] },
      { id:"PT-007", firstName:"Dina",   lastName:"Farouk",    age:"39", phone:"+20 100 890 1234",
        complaint:"Full upper arch tooth loss, uncomfortable with current complete denture.",
        diagnosis:"Complete edentulism maxillary arch. Implant-retained overdenture evaluation.",
        department:"Fixed Prosthodontics", status:"unassigned", assignedTo:"", images:[] },
      { id:"PT-008", firstName:"Hassan", lastName:"Khalil",    age:"22", phone:"+20 111 901 2345",
        complaint:"Loose removable partial denture, sore spots on gums, difficulty chewing.",
        diagnosis:"Ill-fitting RPD requiring relining. New impressions for revised partial denture.",
        department:"Removable Prosthodontics", status:"unassigned", assignedTo:"", images:[] },
    ];

    const DEPT_META = {
      "Operative":                { color:"#0e9ab5", light:"rgba(43,188,212,0.08)",  border:"rgba(43,188,212,0.2)",  icon:"🦷" },
      "Endodontics":              { color:"#e05c2a", light:"rgba(224,92,42,0.07)",   border:"rgba(224,92,42,0.2)",   icon:"🔩" },
      "Periodontics":             { color:"#3a6fd8", light:"rgba(58,111,216,0.07)",  border:"rgba(58,111,216,0.2)",  icon:"🩸" },
      "Oral Surgery":             { color:"#c43085", light:"rgba(196,48,133,0.07)",  border:"rgba(196,48,133,0.2)",  icon:"✂️" },
      "Pedodontics":              { color:"#b07a00", light:"rgba(176,122,0,0.07)",   border:"rgba(176,122,0,0.2)",   icon:"🧸" },
      "Fixed Prosthodontics":     { color:"#7040c8", light:"rgba(112,64,200,0.07)",  border:"rgba(112,64,200,0.2)",  icon:"👑" },
      "Removable Prosthodontics": { color:"#1a8fa8", light:"rgba(26,143,168,0.07)",  border:"rgba(26,143,168,0.2)",  icon:"🔄" },
    };
    const ALL_DEPTS = ["All","Operative","Endodontics","Periodontics","Oral Surgery","Pedodontics","Fixed Prosthodontics","Removable Prosthodontics"];

    /* ── FIREBASE CONFIG ────────────────────────────────────────────────────── */
    // 1. Go to https://console.firebase.google.com → Create project
    // 2. Build → Realtime Database → Create database (start in test mode)
    // 3. Copy your database URL (e.g. https://your-project-default-rtdb.firebaseio.com)
    // 4. Paste it below, replacing the placeholder
    const FIREBASE_URL = "https://xylem-syestem-default-rtdb.europe-west1.firebasedatabase.app";
    const FB_READY = FIREBASE_URL && !FIREBASE_URL.includes("YOUR_FIREBASE");

    /* ── HELPERS ────────────────────────────────────────────────────────────── */
    function parseCSV(text) {
      return text.trim().split("\n").map(row => {
        const cols = []; let cur = ""; let inQ = false;
        for (const c of row) {
          if (c === '"') inQ = !inQ;
          else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
          else cur += c;
        }
        cols.push(cur.trim());
        return cols;
      });
    }
    function extractImageUrls(raw) {
      if (!raw) return [];
      return raw.split(/[\n,]+/).map(s => s.trim()).filter(s => s.startsWith("http"));
    }
    function proxyImg(url) {
      if (!url) return url;
      if (url.includes("jotform.com")) return "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);
      return url;
    }
    function csvToPatients(rows) {
      const headers = rows[0].map(h => h.toLowerCase().trim());
      const get = (row, ...keys) => {
        for (const k of keys) { const i = headers.findIndex(h => h.includes(k)); if (i !== -1 && row[i]) return row[i].trim(); }
        return "";
      };
      return rows.slice(1).filter(r => r.some(c => c)).map((row, i) => {
        const images = [];
        headers.forEach((h, idx) => {
          const isImg = h.includes("image")||h.includes("photo")||h.includes("xray")||h.includes("x-ray")||h.includes("picture")||h.includes("upload")||h.includes("radiograph")||h.includes("intraoral")||h.includes("clinical");
          if (isImg && row[idx]) extractImageUrls(row[idx]).forEach(url => images.push(proxyImg(url)));
        });
        return { id:`PT-${String(i+1).padStart(3,"0")}`, firstName:get(row,"first name","first")||"Patient", lastName:get(row,"last name","last")||String(i+1), age:get(row,"age"), phone:get(row,"phone","number","mobile","tel"), complaint:get(row,"complaint","problem","chief","summary"), diagnosis:get(row,"diagnosis","diag","preliminary"), department:get(row,"department","dept","section")||"Operative", status:"unassigned", assignedTo:"", images };
      });
    }

    /* ── PARTICLES ──────────────────────────────────────────────────────────── */
    const PD = [...Array(20)].map(() => ({ w:5+Math.random()*12, left:Math.random()*100, top:Math.random()*100, dur:14+Math.random()*20, delay:Math.random()*20, op:0.06+Math.random()*0.08 }));
    function FloatingParticles() {
      return (
        <div style={{position:"fixed",inset:0,pointerEvents:"none",overflow:"hidden",zIndex:0}}>
          {PD.map((p,i) => <div key={i} style={{position:"absolute",width:p.w,height:p.w,borderRadius:"50%",background:`rgba(43,188,212,${p.op})`,left:`${p.left}%`,top:`${p.top}%`,animation:`floatParticle ${p.dur}s ease-in-out infinite`,animationDelay:`-${p.delay}s`}}/>)}
        </div>
      );
    }

    /* ── DEPT ICON ──────────────────────────────────────────────────────────── */
    function DeptIcon({ dept, size=44 }) {
      const meta = DEPT_META[dept] || DEPT_META["Operative"];
      const [hov, setHov] = useState(false);
      return (
        <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
          style={{width:size,height:size,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",background:hov?meta.color:meta.light,border:`1.5px solid ${hov?meta.color:meta.border}`,fontSize:size*0.42,transform:hov?"scale(1.18) rotate(-6deg)":"scale(1)",cursor:"default",transition:"all 0.3s cubic-bezier(0.34,1.56,0.64,1)",boxShadow:hov?`0 8px 20px ${meta.color}44`:"none"}}>
          {meta.icon}
        </div>
      );
    }

    /* ── STATUS BUTTON (open to everyone, no locking) ───────────────────────── */
    function StatusButton({ patient, onAssign, onUnassign }) {
      const [popped, setPopped] = useState(false);
      const isAssigned = patient.status === "assigned";
      const handleClick = (e) => {
        e.stopPropagation();
        setPopped(true); setTimeout(() => setPopped(false), 300);
        if (isAssigned) onUnassign(); else onAssign();
      };
      return (
        <button onClick={handleClick} style={{padding:"6px 16px",borderRadius:20,fontWeight:700,fontSize:11,letterSpacing:"0.8px",textTransform:"uppercase",background:isAssigned?"linear-gradient(135deg,#2bbcd4,#1a8fa8)":"rgba(176,122,0,0.09)",color:isAssigned?"#fff":"#b07a00",border:isAssigned?"none":"1.5px solid rgba(176,122,0,0.3)",transform:popped?"scale(1.2)":"scale(1)",transition:"transform 0.25s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.2s",cursor:"pointer",fontFamily:"inherit",boxShadow:isAssigned?"0 4px 14px rgba(43,188,212,0.3)":"none",whiteSpace:"nowrap"}}>
          {isAssigned ? "✓ Assigned" : "◌ Unassigned"}
        </button>
      );
    }

    /* ── IMG WITH FALLBACK ──────────────────────────────────────────────────── */
    function ImgWithFallback({ src, style, fullSize }) {
      const [err, setErr] = useState(false);
      if (err) return (
        <div style={{...style,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#e8f8fb",color:"rgba(10,32,48,0.3)",fontSize:fullSize?14:11,gap:4,textAlign:"center",padding:4}}>
          <span style={{fontSize:fullSize?32:20}}>🦷</span>
          {fullSize && <span>Image unavailable</span>}
        </div>
      );
      return <img src={src} alt="xray" style={style} onError={() => setErr(true)} />;
    }

    /* ── XRAY THUMB ─────────────────────────────────────────────────────────── */
    function XrayThumb({ src, onClick }) {
      const [hov, setHov] = useState(false);
      return (
        <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} onClick={e=>{e.stopPropagation();onClick(src);}}
          style={{width:78,height:78,borderRadius:12,overflow:"hidden",cursor:"pointer",border:`2px solid ${hov?"#2bbcd4":"rgba(43,188,212,0.2)"}`,transform:hov?"scale(1.1) translateY(-4px)":"scale(1)",transition:"all 0.3s cubic-bezier(0.34,1.56,0.64,1)",boxShadow:hov?"0 12px 28px rgba(43,188,212,0.25)":"0 2px 8px rgba(43,188,212,0.08)",background:"#e8f8fb",position:"relative"}}>
          <ImgWithFallback src={src} style={{width:"100%",height:"100%",objectFit:"cover",filter:"brightness(0.92) contrast(1.12)"}} />
          {hov && <div style={{position:"absolute",inset:0,background:"rgba(43,188,212,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🔍</div>}
        </div>
      );
    }

    /* ── LIGHTBOX ───────────────────────────────────────────────────────────── */
    function Lightbox({ src, onClose }) {
      useEffect(() => {
        const h = e => { if (e.key === "Escape") onClose(); };
        document.addEventListener("keydown", h);
        return () => document.removeEventListener("keydown", h);
      }, []);
      return (
        <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,20,35,0.88)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,backdropFilter:"blur(16px)"}}>
          <button onClick={onClose} style={{position:"absolute",top:24,right:32,background:"rgba(43,188,212,0.15)",border:"1px solid rgba(43,188,212,0.3)",color:"#2bbcd4",fontSize:20,cursor:"pointer",width:42,height:42,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
          <ImgWithFallback src={src} fullSize={true} style={{maxWidth:"88vw",maxHeight:"78vh",borderRadius:16,boxShadow:"0 0 60px rgba(43,188,212,0.18),0 0 0 1px rgba(43,188,212,0.2)"}} />
          <span style={{fontSize:11,color:"rgba(255,255,255,0.35)",letterSpacing:"2px",textTransform:"uppercase"}}>Click anywhere to close</span>
        </div>
      );
    }

    /* ── ASSIGN MODAL ───────────────────────────────────────────────────────── */
    function AssignModal({ onConfirm, onClose }) {
      const [name, setName] = useState("");
      const [err, setErr] = useState(false);
      const inputRef = useRef();
      useEffect(() => { setTimeout(() => inputRef.current?.focus(), 80); }, []);
      useEffect(() => {
        const h = e => { if (e.key === "Escape") onClose(); };
        document.addEventListener("keydown", h);
        return () => document.removeEventListener("keydown", h);
      }, []);
      const confirm = () => { if (!name.trim()) { setErr(true); return; } onConfirm(name.trim()); };
      return (
        <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:"fixed",inset:0,background:"rgba(0,20,35,0.45)",zIndex:700,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(16px)"}}>
          <div style={{background:"#fff",borderRadius:28,padding:"38px 36px",width:420,boxShadow:"0 32px 80px rgba(43,188,212,0.18),0 0 0 1px rgba(43,188,212,0.14)",animation:"popIn 0.3s ease both"}}>
            <div style={{width:52,height:52,borderRadius:16,background:"linear-gradient(135deg,#2bbcd4,#1a8fa8)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,marginBottom:14,boxShadow:"0 8px 24px rgba(43,188,212,0.32)"}}>🎓</div>
            <div style={{fontSize:24,fontWeight:800,color:"#0a2030",marginBottom:6}}>Assign Student</div>
            <div style={{fontSize:13,color:"rgba(10,32,48,0.48)",marginBottom:26,lineHeight:1.6}}>Enter the student name to assign this patient.<br/><span style={{color:"#0e9ab5",fontWeight:600}}>Any user can assign or unassign freely.</span></div>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",color:"rgba(10,32,48,0.32)",marginBottom:8}}>Student Name</div>
            <input ref={inputRef} value={name} onChange={e=>{setName(e.target.value);setErr(false);}} onKeyDown={e=>e.key==="Enter"&&confirm()} placeholder="e.g. Mohamed Tarek"
              style={{width:"100%",padding:"13px 16px",borderRadius:12,border:`1.5px solid ${err?"rgba(210,50,50,0.5)":"rgba(43,188,212,0.3)"}`,background:"#f5feff",color:"#0a2030",fontSize:15,fontFamily:"inherit",boxSizing:"border-box",transition:"all 0.2s"}} />
            {err && <div style={{fontSize:12,color:"#c43030",marginTop:6}}>Please enter the student's name.</div>}
            <button onClick={confirm} style={{width:"100%",marginTop:18,padding:14,borderRadius:12,background:"linear-gradient(135deg,#2bbcd4,#1a8fa8)",color:"white",border:"none",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit",boxShadow:"0 6px 20px rgba(43,188,212,0.36)"}}>Confirm Assignment →</button>
            <button onClick={onClose} style={{width:"100%",marginTop:10,padding:10,background:"none",border:"none",fontSize:13,color:"rgba(10,32,48,0.28)",cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
          </div>
        </div>
      );
    }

    /* ── UNASSIGN MODAL ─────────────────────────────────────────────────────── */
    function UnassignModal({ patient, onConfirm, onClose }) {
      useEffect(() => {
        const h = e => { if (e.key === "Escape") onClose(); };
        document.addEventListener("keydown", h);
        return () => document.removeEventListener("keydown", h);
      }, []);
      return (
        <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:"fixed",inset:0,background:"rgba(0,20,35,0.45)",zIndex:700,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(16px)"}}>
          <div style={{background:"#fff",borderRadius:28,padding:"38px 36px",width:420,boxShadow:"0 32px 80px rgba(200,50,50,0.12),0 0 0 1px rgba(200,80,80,0.1)",animation:"popIn 0.3s ease both"}}>
            <div style={{width:52,height:52,borderRadius:16,background:"rgba(200,50,50,0.07)",border:"1.5px solid rgba(200,50,50,0.18)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,marginBottom:14}}>⚠️</div>
            <div style={{fontSize:24,fontWeight:800,color:"#0a2030",marginBottom:6}}>Unassign Patient?</div>
            <div style={{fontSize:13,color:"rgba(10,32,48,0.48)",marginBottom:8,lineHeight:1.6}}>Removing assignment for</div>
            <div style={{fontSize:17,fontWeight:700,color:"#0a2030",marginBottom:10}}>{patient.firstName} {patient.lastName}</div>
            <div style={{fontSize:13,marginBottom:24,padding:"8px 14px",borderRadius:10,background:"rgba(43,188,212,0.06)",border:"1px solid rgba(43,188,212,0.18)",display:"flex",alignItems:"center",gap:6}}>
              <span>🎓</span><span style={{color:"rgba(10,32,48,0.5)"}}>Assigned to:</span><strong style={{color:"#0e9ab5"}}>{patient.assignedTo}</strong>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={onClose} style={{flex:1,padding:13,borderRadius:12,background:"#f0fbfd",border:"1.5px solid rgba(43,188,212,0.22)",color:"#0e9ab5",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Keep Assigned</button>
              <button onClick={onConfirm} style={{flex:1,padding:13,borderRadius:12,background:"rgba(200,50,50,0.07)",border:"1.5px solid rgba(200,50,50,0.2)",color:"#c43030",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Unassign</button>
            </div>
          </div>
        </div>
      );
    }

    /* ── PATIENT CARD ───────────────────────────────────────────────────────── */
    function PatientCard({ patient, onAssign, onUnassign, onOpenDetail, index }) {
      const meta = DEPT_META[patient.department] || DEPT_META["Operative"];
      const [hov, setHov] = useState(false);
      const [lightbox, setLightbox] = useState(null);
      return (
        <>
          <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} onClick={()=>onOpenDetail(patient)}
            style={{background:hov?"#fff":"rgba(255,255,255,0.85)",borderRadius:24,border:`1.5px solid ${hov?meta.color:meta.border}`,overflow:"hidden",cursor:"pointer",transform:hov?"translateY(-8px) scale(1.01)":"translateY(0) scale(1)",transition:"all 0.4s cubic-bezier(0.34,1.56,0.64,1)",boxShadow:hov?`0 24px 60px rgba(43,188,212,0.16),0 0 0 1.5px ${meta.color}33`:"0 4px 20px rgba(43,188,212,0.08)",animation:"slideUp 0.5s ease both",animationDelay:`${index*0.06}s`}}>
            <div style={{height:4,background:`linear-gradient(90deg,${meta.color},rgba(43,188,212,0.25),transparent)`}}/>
            <div style={{padding:"20px 22px"}}>
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:14,gap:8}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <DeptIcon dept={patient.department} size={44}/>
                  <div>
                    <div style={{fontSize:17,fontWeight:700,color:"#0a2030",letterSpacing:"-0.3px",lineHeight:1.2}}>{patient.firstName} {patient.lastName}</div>
                    <div style={{fontSize:11,color:"rgba(10,32,48,0.32)",marginTop:2,letterSpacing:"1px"}}>{patient.id}</div>
                  </div>
                </div>
                <div onClick={e=>e.stopPropagation()}>
                  <StatusButton patient={patient} onAssign={()=>onAssign(patient.id)} onUnassign={()=>onUnassign(patient.id)}/>
                </div>
              </div>
              {patient.status==="assigned" && patient.assignedTo && (
                <div style={{display:"flex",alignItems:"center",gap:7,padding:"7px 12px",borderRadius:10,background:"linear-gradient(135deg,rgba(43,188,212,0.07),rgba(26,143,168,0.04))",border:"1px solid rgba(43,188,212,0.2)",marginBottom:12}}>
                  <span style={{fontSize:14}}>🎓</span>
                  <span style={{fontSize:12,color:"rgba(10,32,48,0.42)"}}>Assigned to:</span>
                  <span style={{fontSize:12,fontWeight:700,color:"#0e9ab5"}}>{patient.assignedTo}</span>
                </div>
              )}
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
                <span style={{padding:"3px 10px",borderRadius:8,fontSize:10,fontWeight:700,letterSpacing:"0.8px",textTransform:"uppercase",background:meta.light,color:meta.color,border:`1px solid ${meta.border}`}}>{patient.department}</span>
                {patient.age && <span style={{padding:"3px 10px",borderRadius:8,fontSize:10,background:"rgba(43,188,212,0.05)",color:"rgba(10,32,48,0.48)",border:"1px solid rgba(43,188,212,0.14)"}}>{patient.age} yrs</span>}
                {patient.phone && <span style={{padding:"3px 10px",borderRadius:8,fontSize:10,background:"rgba(43,188,212,0.05)",color:"rgba(10,32,48,0.48)",border:"1px solid rgba(43,188,212,0.14)"}}>{patient.phone}</span>}
              </div>
              <div style={{marginBottom:10}}>
                <div style={{fontSize:9,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",color:"rgba(10,32,48,0.28)",marginBottom:5}}>Chief Complaint</div>
                <div style={{fontSize:13,color:"rgba(10,32,48,0.68)",lineHeight:1.6,padding:"10px 12px",borderRadius:10,background:"rgba(43,188,212,0.04)",borderLeft:`3px solid ${meta.color}`,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{patient.complaint}</div>
              </div>
              <div style={{marginBottom:14}}>
                <div style={{fontSize:9,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",color:"rgba(10,32,48,0.28)",marginBottom:5}}>Preliminary Diagnosis</div>
                <div style={{fontSize:12,color:"rgba(10,32,48,0.48)",lineHeight:1.55,padding:"8px 12px",borderRadius:10,background:"rgba(43,188,212,0.03)",border:"1px solid rgba(43,188,212,0.1)",overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{patient.diagnosis}</div>
              </div>
              {patient.images && patient.images.length > 0
                ? <div><div style={{fontSize:9,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",color:"rgba(10,32,48,0.28)",marginBottom:8}}>Radiographs</div><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{patient.images.slice(0,4).map((img,i)=><XrayThumb key={i} src={img} onClick={s=>setLightbox(s)}/>)}</div></div>
                : <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",borderRadius:10,background:"rgba(43,188,212,0.03)",border:"1px dashed rgba(43,188,212,0.18)"}}><span style={{fontSize:16,opacity:0.3}}>📷</span><span style={{fontSize:11,color:"rgba(10,32,48,0.28)"}}>No images uploaded</span></div>
              }
            </div>
            <div style={{padding:"10px 22px",borderTop:"1px solid rgba(43,188,212,0.1)",display:"flex",justifyContent:"flex-end"}}>
              <span style={{fontSize:11,color:meta.color,fontWeight:600,opacity:hov?1:0.35,transition:"opacity 0.2s"}}>View Full Record →</span>
            </div>
          </div>
          {lightbox && <Lightbox src={lightbox} onClose={()=>setLightbox(null)}/>}
        </>
      );
    }

    /* ── DETAIL MODAL ───────────────────────────────────────────────────────── */
    function DetailModal({ patient, onAssign, onUnassign, onClose }) {
      const meta = DEPT_META[patient.department] || DEPT_META["Operative"];
      const [lightbox, setLightbox] = useState(null);
      useEffect(() => {
        const h = e => { if (e.key === "Escape") onClose(); };
        document.addEventListener("keydown", h);
        return () => document.removeEventListener("keydown", h);
      }, []);
      return (
        <>
          <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:"fixed",inset:0,background:"rgba(0,20,35,0.45)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:24,backdropFilter:"blur(12px)"}}>
            <div style={{background:"#fff",borderRadius:28,width:"100%",maxWidth:680,maxHeight:"88vh",overflowY:"auto",boxShadow:`0 32px 100px rgba(43,188,212,0.18),0 0 0 1.5px ${meta.color}33`,animation:"popIn 0.3s ease both"}}>
              <div style={{background:`linear-gradient(135deg,#f5feff 0%,${meta.light} 100%)`,padding:"28px 32px 24px",borderBottom:`1px solid ${meta.border}`,position:"sticky",top:0,backdropFilter:"blur(20px)",borderRadius:"28px 28px 0 0",zIndex:10}}>
                <button onClick={onClose} style={{position:"absolute",top:20,right:24,background:"rgba(43,188,212,0.09)",border:"1px solid rgba(43,188,212,0.2)",color:"#0e9ab5",fontSize:14,cursor:"pointer",width:32,height:32,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16}}>
                  <DeptIcon dept={patient.department} size={52}/>
                  <div>
                    <div style={{fontSize:24,fontWeight:800,color:"#0a2030",letterSpacing:"-0.5px"}}>{patient.firstName} {patient.lastName}</div>
                    <div style={{fontSize:11,color:"rgba(10,32,48,0.32)",letterSpacing:"1.5px",marginTop:3}}>{patient.id} · {patient.department.toUpperCase()}</div>
                  </div>
                </div>
                <StatusButton patient={patient} onAssign={()=>onAssign(patient.id)} onUnassign={()=>onUnassign(patient.id)}/>
                {patient.status==="assigned" && patient.assignedTo && (
                  <div style={{display:"inline-flex",alignItems:"center",gap:7,padding:"7px 14px",borderRadius:10,background:"rgba(43,188,212,0.07)",border:"1px solid rgba(43,188,212,0.2)",marginTop:12}}>
                    <span>🎓</span><span style={{fontSize:12,color:"rgba(10,32,48,0.42)"}}>Assigned to:</span><span style={{fontSize:13,fontWeight:700,color:"#0e9ab5"}}>{patient.assignedTo}</span>
                  </div>
                )}
              </div>
              <div style={{padding:"28px 32px"}}>
                <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:26}}>
                  {[["🎂","Age",patient.age],["📞","Phone",patient.phone],["🏥","Dept",patient.department]].filter(c=>c[2]).map(([icon,label,val],i)=>(
                    <div key={i} style={{padding:"10px 16px",borderRadius:14,background:"rgba(43,188,212,0.05)",border:"1px solid rgba(43,188,212,0.14)"}}>
                      <div style={{fontSize:10,color:"rgba(10,32,48,0.32)",letterSpacing:"1px",textTransform:"uppercase",marginBottom:3}}>{icon} {label}</div>
                      <div style={{fontSize:14,fontWeight:600,color:"#0a2030"}}>{val}</div>
                    </div>
                  ))}
                </div>
                {[["Chief Complaint",patient.complaint,"rgba(43,188,212,0.06)",meta.color],["Preliminary Diagnosis",patient.diagnosis,"rgba(43,188,212,0.03)","rgba(43,188,212,0.2)"]].map(([title,content,bg,border])=>(
                  <div key={title} style={{marginBottom:20}}>
                    <div style={{fontSize:10,fontWeight:700,letterSpacing:"2px",textTransform:"uppercase",color:"rgba(10,32,48,0.28)",marginBottom:8,paddingBottom:6,borderBottom:"1px solid rgba(43,188,212,0.1)"}}>{title}</div>
                    <div style={{fontSize:14,color:"rgba(10,32,48,0.7)",lineHeight:1.7,padding:"14px 16px",borderRadius:12,background:bg,borderLeft:`3px solid ${border}`}}>{content}</div>
                  </div>
                ))}
                {patient.images && patient.images.length > 0 && (
                  <div>
                    <div style={{fontSize:10,fontWeight:700,letterSpacing:"2px",textTransform:"uppercase",color:"rgba(10,32,48,0.28)",marginBottom:12,paddingBottom:6,borderBottom:"1px solid rgba(43,188,212,0.1)"}}>Radiographs / Images</div>
                    <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                      {patient.images.map((img,i)=>(
                        <img key={i} src={img} alt="xray" onClick={()=>setLightbox(img)}
                          style={{width:150,height:150,borderRadius:14,objectFit:"cover",cursor:"pointer",border:"2px solid rgba(43,188,212,0.18)",transition:"all 0.3s"}}
                          onMouseEnter={e=>{e.target.style.transform="scale(1.05)";e.target.style.borderColor=meta.color;}}
                          onMouseLeave={e=>{e.target.style.transform="scale(1)";e.target.style.borderColor="rgba(43,188,212,0.18)";}}/>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
          {lightbox && <Lightbox src={lightbox} onClose={()=>setLightbox(null)}/>}
        </>
      );
    }

    /* ── MAIN APP ───────────────────────────────────────────────────────────── */
    function XylemSystem() {
      const [patients, setPatients] = useState(DEMO);
      const [dept, setDept] = useState("All");
      const [search, setSearch] = useState("");
      const [statusFilters, setStatusFilters] = useState(new Set(["assigned","unassigned"]));
      const [detailPatient, setDetailPatient] = useState(null);
      const [sheetInput, setSheetInput] = useState("https://docs.google.com/spreadsheets/d/e/2PACX-1vRhXrMrJnkMNTI0YRL-H2JKfF6nY0btinpd18qXEsGNmcI6CECY_f8IcthDB7-Ci5ukTkHZ5TvjfijF/pub?gid=939469878&single=true&output=csv");
      const [sheetConnected, setSheetConnected] = useState(false);
      const [bannerVisible, setBannerVisible] = useState(false);
      const [syncTime, setSyncTime] = useState(null);
      const [syncing, setSyncing] = useState(false);
      const [syncError, setSyncError] = useState(false);
      const [assignTarget, setAssignTarget] = useState(null);
      const [unassignTarget, setUnassignTarget] = useState(null);
      const syncRef = useRef(null);
      const fbRef = useRef(null);
      const assignmentsRef = useRef({});

      /* ── FIREBASE: write one assignment ─────────────────────────────────── */
      const pushAssignment = async (id, data) => {
        if (!FB_READY) return;
        try {
          await fetch(`${FIREBASE_URL}/assignments/${id}.json`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
          });
        } catch(e) { console.error("Firebase write error:", e); }
      };

      /* ── FIREBASE: read all assignments and merge into patients ─────────── */
      const fetchAssignments = useCallback(async () => {
        if (!FB_READY) return;
        try {
          const res = await fetch(`${FIREBASE_URL}/assignments.json?t=` + Date.now());
          const data = await res.json();
          if (data && typeof data === "object") {
            assignmentsRef.current = data;
            setPatients(prev => prev.map(p => data[p.id] ? { ...p, ...data[p.id] } : p));
            setDetailPatient(prev => prev && data[prev.id] ? { ...prev, ...data[prev.id] } : prev);
          }
        } catch(e) { console.error("Firebase read error:", e); }
      }, []);

      /* ── SHEET: fetch and merge with stored Firebase assignments ─────────── */
      const fetchSheet = useCallback(async (url) => {
        try {
          setSyncing(true); setSyncError(false);
          const res = await fetch(url + (url.includes("?") ? "&t=" : "?t=") + Date.now());
          const text = await res.text();
          const rows = parseCSV(text);
          if (rows.length > 1) {
            const fresh = csvToPatients(rows);
            const merged = fresh.map(p => assignmentsRef.current[p.id] ? { ...p, ...assignmentsRef.current[p.id] } : p);
            setPatients(merged);
            setSyncTime(new Date()); setSheetConnected(true);
          } else { setSyncError(true); }
        } catch(e) { console.error(e); setSyncError(true); } finally { setSyncing(false); }
      }, []);

      const connectSheet = () => {
        if (!sheetInput.trim()) return;
        fetchSheet(sheetInput.trim());
        if (syncRef.current) clearInterval(syncRef.current);
        syncRef.current = setInterval(() => fetchSheet(sheetInput.trim()), 30000);
      };

      /* ── on mount: connect sheet + start Firebase polling ───────────────── */
      useEffect(() => {
        connectSheet();
        if (FB_READY) {
          fetchAssignments();
          fbRef.current = setInterval(fetchAssignments, 5000);
        }
        return () => { clearInterval(syncRef.current); clearInterval(fbRef.current); };
      }, []);

      const handleAssign = useCallback((id) => setAssignTarget(id), []);
      const confirmAssign = useCallback((studentName) => {
        const data = { status: "assigned", assignedTo: studentName };
        assignmentsRef.current[assignTarget] = data;
        setPatients(prev => prev.map(p => p.id === assignTarget ? { ...p, ...data } : p));
        setDetailPatient(prev => prev?.id === assignTarget ? { ...prev, ...data } : prev);
        pushAssignment(assignTarget, data);
        setAssignTarget(null);
      }, [assignTarget]);

      const handleUnassign = useCallback((id) => setUnassignTarget(id), []);
      const confirmUnassign = useCallback(() => {
        const data = { status: "unassigned", assignedTo: "" };
        assignmentsRef.current[unassignTarget] = data;
        setPatients(prev => prev.map(p => p.id === unassignTarget ? { ...p, ...data } : p));
        setDetailPatient(prev => prev?.id === unassignTarget ? { ...prev, ...data } : prev);
        pushAssignment(unassignTarget, data);
        setUnassignTarget(null);
      }, [unassignTarget]);

      const filtered = useMemo(() => patients.filter(p => {
        const dm = dept === "All" || p.department === dept;
        const sm = statusFilters.has(p.status);
        const qm = !search || `${p.firstName} ${p.lastName} ${p.complaint} ${p.diagnosis}`.toLowerCase().includes(search.toLowerCase());
        return dm && sm && qm;
      }), [patients, dept, search, statusFilters]);

      const toggleSF = (s) => setStatusFilters(prev => {
        const n = new Set(prev);
        if (n.has(s)) { if (n.size > 1) n.delete(s); } else n.add(s);
        return n;
      });
      const unassignPatient = patients.find(p => p.id === unassignTarget);

      return (
        <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#f5feff 0%,#e8f8fc 45%,#f0fbfd 100%)",position:"relative",fontFamily:"'Syne','DM Sans',sans-serif"}}>
          <FloatingParticles/>

          {/* HEADER */}
          <header style={{background:"rgba(255,255,255,0.92)",backdropFilter:"blur(24px)",borderBottom:"1px solid rgba(43,188,212,0.18)",padding:"0 32px",height:68,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 20px rgba(43,188,212,0.09)"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:44,height:44,borderRadius:13,background:"linear-gradient(135deg,#e0f7fa,#b2ebf2)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 16px rgba(43,188,212,0.22)",border:"1.5px solid rgba(43,188,212,0.22)",fontSize:22}}>🦷</div>
              <div>
                <div style={{fontSize:19,fontWeight:800,letterSpacing:"-0.5px",background:"linear-gradient(135deg,#0e9ab5,#2bbcd4,#1a8fa8)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Xylem System</div>
                <div style={{fontSize:9,color:"rgba(10,32,48,0.35)",letterSpacing:"2px",textTransform:"uppercase"}}>Patient Management</div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:7,padding:"6px 14px",borderRadius:20,background:"rgba(43,188,212,0.07)",border:"1px solid rgba(43,188,212,0.18)",fontSize:12}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:syncing?"#f0a030":"#2bbcd4",animation:"glow 2s infinite"}}/>
              <span style={{color:"rgba(10,32,48,0.45)",fontWeight:500}}>
                {syncing ? "Syncing…" : syncTime ? `Synced ${syncTime.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}` : "Live Sync"}
              </span>
            </div>
          </header>

          {/* SHEET BANNER */}
          {bannerVisible && (
            <div style={{background:sheetConnected?"rgba(43,188,212,0.05)":syncError?"rgba(200,50,50,0.04)":"rgba(176,122,0,0.05)",borderBottom:`1px solid ${sheetConnected?"rgba(43,188,212,0.14)":syncError?"rgba(200,50,50,0.15)":"rgba(176,122,0,0.12)"}`,padding:"11px 32px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              <span>{sheetConnected ? "✅" : syncError ? "❌" : "📋"}</span>
              {sheetConnected
                ? <span style={{fontSize:13,color:"#0e9ab5",fontWeight:600}}>Sheet connected — syncing every 30s</span>
                : syncError
                  ? <span style={{fontSize:13,color:"#c44030",fontWeight:500}}>Could not load sheet. Check the URL.</span>
                  : <span style={{fontSize:13,color:"#b07a00",fontWeight:500}}>Connect a Google Sheet:</span>
              }
              <input value={sheetInput} onChange={e=>setSheetInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&connectSheet()} placeholder="Published CSV URL…"
                style={{flex:1,minWidth:220,padding:"6px 12px",borderRadius:8,border:`1px solid ${sheetConnected?"rgba(43,188,212,0.22)":"rgba(176,122,0,0.22)"}`,background:"rgba(255,255,255,0.7)",color:"#0a2030",fontSize:12,fontFamily:"inherit"}}/>
              <button onClick={connectSheet} style={{padding:"6px 16px",borderRadius:8,background:sheetConnected?"rgba(43,188,212,0.1)":"rgba(176,122,0,0.1)",border:`1px solid ${sheetConnected?"rgba(43,188,212,0.28)":"rgba(176,122,0,0.28)"}`,color:sheetConnected?"#0e9ab5":"#b07a00",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                {sheetConnected ? "Re-sync" : "Connect →"}
              </button>
              {sheetConnected && <button onClick={()=>setBannerVisible(false)} style={{padding:"6px 12px",borderRadius:8,background:"rgba(43,188,212,0.06)",border:"1px solid rgba(43,188,212,0.14)",color:"rgba(10,32,48,0.35)",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Hide</button>}
            </div>
          )}

          {/* CONTROLS */}
          <div style={{padding:"14px 32px",borderBottom:"1px solid rgba(43,188,212,0.1)",display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",background:"rgba(255,255,255,0.5)"}}>
            <div style={{position:"relative",flex:1,minWidth:200}}>
              <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",opacity:0.28,fontSize:13}}>🔍</span>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search patients, complaints, diagnoses…"
                style={{width:"100%",padding:"10px 14px 10px 38px",borderRadius:12,border:"1.5px solid rgba(43,188,212,0.2)",background:"rgba(255,255,255,0.8)",color:"#0a2030",fontSize:13,fontFamily:"inherit",transition:"all 0.2s"}}/>
            </div>
            <div style={{display:"flex",gap:6}}>
              {["assigned","unassigned"].map(s=>(
                <button key={s} onClick={()=>toggleSF(s)} style={{padding:"7px 13px",borderRadius:10,border:`1.5px solid ${statusFilters.has(s)?s==="assigned"?"rgba(43,188,212,0.38)":"rgba(176,122,0,0.38)":"rgba(43,188,212,0.12)"}`,background:statusFilters.has(s)?s==="assigned"?"rgba(43,188,212,0.08)":"rgba(176,122,0,0.07)":"transparent",color:statusFilters.has(s)?s==="assigned"?"#0e9ab5":"#b07a00":"rgba(10,32,48,0.3)",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",letterSpacing:"0.8px",textTransform:"uppercase",transition:"all 0.2s"}}>
                  {s==="assigned" ? "✓ Assigned" : "◌ Unassigned"}
                </button>
              ))}
            </div>
          </div>

          {/* DEPT TABS */}
          <div style={{padding:"14px 32px 0",display:"flex",gap:6,flexWrap:"wrap",borderBottom:"1px solid rgba(43,188,212,0.1)",background:"rgba(255,255,255,0.4)"}}>
            {ALL_DEPTS.map(d => {
              const meta = DEPT_META[d]; const active = dept === d;
              return (
                <button key={d} onClick={()=>setDept(d)} style={{padding:"7px 14px",borderRadius:"10px 10px 0 0",border:`1px solid ${active?(meta?.color||"#2bbcd4")+"44":"rgba(43,188,212,0.1)"}`,borderBottom:active?"1px solid #f5feff":"none",marginBottom:-1,background:active?"rgba(255,255,255,0.98)":"transparent",color:active?(meta?.color||"#0e9ab5"):"rgba(10,32,48,0.38)",fontSize:11,fontWeight:active?700:400,cursor:"pointer",fontFamily:"inherit",transition:"all 0.2s"}}>
                  {meta?.icon && <span style={{marginRight:4}}>{meta.icon}</span>}{d}
                </button>
              );
            })}
          </div>

          {/* STATS */}
          <div style={{padding:"12px 32px",display:"flex",gap:24,alignItems:"center",background:"rgba(255,255,255,0.3)",borderBottom:"1px solid rgba(43,188,212,0.07)"}}>
            {[["Total",patients.length,"#0a2030"],["Assigned",patients.filter(p=>p.status==="assigned").length,"#0e9ab5"],["Unassigned",patients.filter(p=>p.status==="unassigned").length,"#b07a00"],["Showing",filtered.length,"#3a6fd8"]].map(([label,num,color])=>(
              <div key={label} style={{display:"flex",alignItems:"baseline",gap:5}}>
                <span style={{fontSize:24,fontWeight:800,color,letterSpacing:"-1px"}}>{num}</span>
                <span style={{fontSize:9,color:"rgba(10,32,48,0.3)",letterSpacing:"1.5px",textTransform:"uppercase"}}>{label}</span>
              </div>
            ))}
          </div>

          {/* GRID */}
          <div style={{padding:"20px 32px 60px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",gap:18}}>
            {filtered.length === 0
              ? <div style={{gridColumn:"1/-1",textAlign:"center",padding:"80px 0",color:"rgba(10,32,48,0.22)"}}>
                  <div style={{fontSize:44,marginBottom:12}}>🦷</div>
                  <div style={{fontSize:18,fontWeight:700,marginBottom:6,color:"rgba(10,32,48,0.35)"}}>No patients found</div>
                  <div style={{fontSize:13}}>Try adjusting your filters or search</div>
                </div>
              : filtered.map((p,i) => (
                  <PatientCard key={p.id} patient={p} index={i}
                    onAssign={handleAssign} onUnassign={handleUnassign}
                    onOpenDetail={p => setDetailPatient(patients.find(x=>x.id===p.id)||p)}/>
                ))
            }
          </div>

          {detailPatient && <DetailModal patient={patients.find(p=>p.id===detailPatient.id)||detailPatient} onAssign={handleAssign} onUnassign={handleUnassign} onClose={()=>setDetailPatient(null)}/>}
          {assignTarget && <AssignModal onConfirm={confirmAssign} onClose={()=>setAssignTarget(null)}/>}
          {unassignTarget && unassignPatient && <UnassignModal patient={unassignPatient} onConfirm={confirmUnassign} onClose={()=>setUnassignTarget(null)}/>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<XylemSystem/>);
  </script>
</body>
</html>
